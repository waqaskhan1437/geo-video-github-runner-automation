name: Geo Mapping Video Automation

on:
  workflow_dispatch:
    inputs:
      points_file:
        description: "Path to route points JSON file in repo"
        required: false
        default: "data/route_points.sample.json"
      points_json:
        description: "Optional raw JSON string (overrides points_file)"
        required: false
        default: ""
      title:
        description: "Video title text"
        required: false
        default: "Geo Mapping Route Animation"
      output_name:
        description: "Output mp4 file name"
        required: false
        default: "geo_mapping_video.mp4"
      width:
        description: "Video width"
        required: false
        default: "1280"
      height:
        description: "Video height"
        required: false
        default: "720"
      fps:
        description: "Frames per second"
        required: false
        default: "30"
      duration_seconds:
        description: "Video duration in seconds"
        required: false
        default: "12"
      keep_frames:
        description: "Keep raw frame images"
        required: false
        type: choice
        default: "false"
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: geo-video-automation
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render geo video
        id: render
        env:
          GEO_POINTS_FILE: ${{ inputs.points_file || 'data/route_points.sample.json' }}
          GEO_POINTS_JSON: ${{ inputs.points_json || '' }}
          GEO_TITLE: ${{ inputs.title || 'Geo Mapping Route Animation' }}
          GEO_OUTPUT_NAME: ${{ inputs.output_name || 'geo_mapping_video.mp4' }}
          GEO_WIDTH: ${{ inputs.width || '1280' }}
          GEO_HEIGHT: ${{ inputs.height || '720' }}
          GEO_FPS: ${{ inputs.fps || '30' }}
          GEO_DURATION_SECONDS: ${{ inputs.duration_seconds || '12' }}
          GEO_KEEP_FRAMES: ${{ inputs.keep_frames || 'false' }}
          GEO_OUTPUT_DIR: outputs/geo-video
        run: python scripts/geo_video_automation.py

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: geo-video-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.render.outputs.output_video }}
          if-no-files-found: error
          retention-days: 14

