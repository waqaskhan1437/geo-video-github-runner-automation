name: GPU AI Stack (Self-Hosted)

on:
  workflow_dispatch:
    inputs:
      install_open_source_editor:
        description: "Install MoviePy/OpenCV editor stack"
        required: false
        default: "true"
      run_cpu_documentary_render:
        description: "Run documentary render after setup"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  setup-gpu-stack:
    runs-on: [self-hosted, linux, x64, gpu]
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg git curl

      - name: Install GPU AI stack (ComfyUI + manager + video helpers)
        env:
          DOC_INSTALL_OPEN_SOURCE_EDITOR: ${{ inputs.install_open_source_editor == 'true' && '1' || '0' }}
        run: |
          chmod +x scripts/setup_gpu_ai_stack.sh
          ./scripts/setup_gpu_ai_stack.sh

      - name: Optional CPU documentary render
        if: ${{ inputs.run_cpu_documentary_render == 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python scripts/render_conflict_documentary.py

      - name: Upload setup summary
        run: |
          mkdir -p outputs/final
          echo "Self-hosted GPU stack setup completed on $(date -u)" > outputs/final/gpu_stack_setup.txt
          echo "Runner: $RUNNER_NAME" >> outputs/final/gpu_stack_setup.txt
          echo "ComfyUI path: .ai-stack/ComfyUI" >> outputs/final/gpu_stack_setup.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gpu-ai-stack-${{ github.run_id }}-${{ github.run_attempt }}
          path: outputs/final
          if-no-files-found: error
          retention-days: 14

