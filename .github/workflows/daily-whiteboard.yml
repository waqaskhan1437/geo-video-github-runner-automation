name: Daily Whiteboard Video Automation

on:
  workflow_dispatch:
    inputs:
      run_date:
        description: "Date in YYYY-MM-DD"
        required: false
        default: ""
      count:
        description: "How many videos"
        required: false
        default: "3"
      engine:
        description: "Renderer engine"
        required: false
        default: "pillow"
  schedule:
    - cron: "20 3 * * *"

jobs:
  build-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate daily videos
        env:
          INPUT_DATE: ${{ github.event.inputs.run_date }}
          INPUT_COUNT: ${{ github.event.inputs.count }}
          INPUT_ENGINE: ${{ github.event.inputs.engine }}
        run: |
          RUN_DATE="$INPUT_DATE"
          if [ -z "$RUN_DATE" ]; then
            RUN_DATE="$(date -u +%F)"
          fi

          COUNT="$INPUT_COUNT"
          if [ -z "$COUNT" ]; then
            COUNT="3"
          fi

          ENGINE="$INPUT_ENGINE"
          if [ -z "$ENGINE" ]; then
            ENGINE="pillow"
          fi

          python run.py batch --date "$RUN_DATE" --count "$COUNT" --engine "$ENGINE"

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: whiteboard-videos-${{ github.run_number }}
          path: |
            output/**
            state/history.json
          if-no-files-found: warn
